<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolidWorks Controller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        button.close-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button.close-btn:hover {
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.4);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95em;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .version-info {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            color: #666;
            font-size: 0.9em;
        }

        .version-selector {
            margin-bottom: 20px;
            text-align: left;
        }

        .version-selector label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        .version-selector select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            background: white;
            color: #333;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .version-selector select:hover {
            border-color: #667eea;
        }

        .version-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .lock-status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95em;
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .lock-status.has-lock {
            background: #d4edda;
            color: #155724;
            border-color: #c3e6cb;
        }

        .lock-status.no-lock {
            background: #fff3cd;
            color: #856404;
            border-color: #ffeaa7;
        }

        .control-buttons button {
            opacity: 0.5;
            pointer-events: none;
        }

        .control-buttons.unlocked button {
            opacity: 1;
            pointer-events: auto;
        }

        button.acquire-lock-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        button.acquire-lock-btn:hover {
            box-shadow: 0 10px 20px rgba(56, 239, 125, 0.4);
        }

        button.release-lock-btn {
            background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        button.release-lock-btn:hover {
            box-shadow: 0 10px 20px rgba(238, 9, 121, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 SolidWorks Controller</h1>
        <p class="subtitle">Open and control SolidWorks from your browser</p>
        
        <div id="lockStatus" class="lock-status no-lock">
            <strong>Control Status:</strong> <span id="lockStatusText">Checking...</span>
        </div>

        <div class="button-group">
            <button id="acquireLockBtn" class="acquire-lock-btn" onclick="acquireLock()">
                Request Control
            </button>
            <button id="releaseLockBtn" class="release-lock-btn" onclick="releaseLock()" style="display: none;">
                Release Control
            </button>
        </div>
        
        <div class="version-selector">
            <label for="versionSelect">Select SolidWorks Version:</label>
            <select id="versionSelect">
                <option value="">Loading versions...</option>
            </select>
        </div>
        
        <div class="button-group control-buttons" id="controlButtons">
            <button id="openBtn" onclick="openSolidWorks()">
                Open SolidWorks
            </button>
            <button id="closeBtn" class="close-btn" onclick="closeSolidWorks()">
                Close SolidWorks
            </button>
            <button id="statusBtn" onclick="checkStatus()">
                Check Status
            </button>
        </div>

        <div id="status" class="status info" style="display: none;">
            Ready to connect...
        </div>

        <div id="versionInfo" class="version-info" style="display: none;"></div>
    </div>

    <script>
        const apiBaseUrl = '/api/SolidWorks';
        let hasLock = false;
        let heartbeatInterval = null;

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'flex';
        }

        function showLoading(button) {
            button.disabled = true;
            const originalText = button.textContent;
            button.setAttribute('data-original-text', originalText);
            button.innerHTML = '<span class="loading"></span>Processing...';
        }

        function hideLoading(button) {
            button.disabled = false;
            const originalText = button.getAttribute('data-original-text') || 'Button';
            button.innerHTML = originalText;
        }

        function updateLockUI(lockStatus) {
            hasLock = lockStatus;
            const lockStatusDiv = document.getElementById('lockStatus');
            const lockStatusText = document.getElementById('lockStatusText');
            const acquireLockBtn = document.getElementById('acquireLockBtn');
            const releaseLockBtn = document.getElementById('releaseLockBtn');
            const controlButtons = document.getElementById('controlButtons');

            if (hasLock) {
                lockStatusDiv.className = 'lock-status has-lock';
                lockStatusText.textContent = 'You have control of SolidWorks';
                acquireLockBtn.style.display = 'none';
                releaseLockBtn.style.display = 'block';
                controlButtons.classList.add('unlocked');
                startHeartbeat();
            } else {
                lockStatusDiv.className = 'lock-status no-lock';
                lockStatusText.textContent = 'Another device may be in control - Request control to operate';
                acquireLockBtn.style.display = 'block';
                releaseLockBtn.style.display = 'none';
                controlButtons.classList.remove('unlocked');
                stopHeartbeat();
            }
        }

        async function checkLockStatus() {
            try {
                const response = await fetch(`${apiBaseUrl}/LockStatus`, {
                    method: 'GET',
                    credentials: 'include'
                });

                const data = await response.json();

                if (data.success) {
                    updateLockUI(data.hasLock);
                }
            } catch (error) {
                console.error('Error checking lock status:', error);
            }
        }

        async function acquireLock() {
            const btn = document.getElementById('acquireLockBtn');
            showLoading(btn);

            try {
                const response = await fetch(`${apiBaseUrl}/AcquireLock`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('Control acquired! You can now operate SolidWorks.', 'success');
                    updateLockUI(true);
                } else {
                    showStatus(data.message || 'Failed to acquire control. Another device is in control.', 'warning');
                    updateLockUI(false);
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                hideLoading(btn);
            }
        }

        async function releaseLock() {
            const btn = document.getElementById('releaseLockBtn');
            showLoading(btn);

            try {
                const response = await fetch(`${apiBaseUrl}/ReleaseLock`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('Control released. Other devices can now take control.', 'info');
                    updateLockUI(false);
                } else {
                    showStatus(data.message || 'Failed to release control', 'error');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                hideLoading(btn);
            }
        }

        function startHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
            }

            heartbeatInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${apiBaseUrl}/Heartbeat`, {
                        method: 'POST',
                        credentials: 'include',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });

                    const data = await response.json();

                    if (!data.success) {
                        // Lost the lock
                        hasLock = false;
                        updateLockUI(false);
                        showStatus('Control was lost. Another device may have taken over.', 'warning');
                    }
                } catch (error) {
                    console.error('Heartbeat error:', error);
                }
            }, 30000); // Every 30 seconds
        }

        function stopHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
        }

        // Release lock when page is closed
        window.addEventListener('beforeunload', () => {
            if (hasLock) {
                navigator.sendBeacon(`${apiBaseUrl}/ReleaseLock`);
            }
        });

        // Release lock when page visibility changes (tab switched)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && hasLock) {
                // Optionally release lock when tab is hidden
                // Uncomment the line below if you want to auto-release on tab switch
                // releaseLock();
            }
        });

        async function loadAvailableVersions() {
            try {
                const response = await fetch(`${apiBaseUrl}/AvailableVersions`, {
                    method: 'GET'
                });

                const data = await response.json();
                const versionSelect = document.getElementById('versionSelect');

                if (data.success && data.versions && data.versions.length > 0) {
                    versionSelect.innerHTML = '';
                    data.versions.forEach(version => {
                        const option = document.createElement('option');
                        option.value = version;
                        option.textContent = `SolidWorks ${version}`;
                        versionSelect.appendChild(option);
                    });
                    // Select the first version by default
                    if (data.versions.length > 0) {
                        versionSelect.value = data.versions[0];
                    }
                } else {
                    versionSelect.innerHTML = '<option value="">No versions found</option>';
                    showStatus('No SolidWorks versions found. Please ensure SolidWorks is installed.', 'error');
                }
            } catch (error) {
                const versionSelect = document.getElementById('versionSelect');
                versionSelect.innerHTML = '<option value="">Error loading versions</option>';
                showStatus(`Error loading versions: ${error.message}`, 'error');
            }
        }

        async function openSolidWorks() {
            if (!hasLock) {
                showStatus('You must acquire control first before opening SolidWorks.', 'warning');
                return;
            }

            const btn = document.getElementById('openBtn');
            const versionSelect = document.getElementById('versionSelect');
            const selectedVersion = versionSelect.value;

            if (!selectedVersion) {
                showStatus('Please select a SolidWorks version', 'error');
                return;
            }

            showLoading(btn);
            showStatus('Opening SolidWorks...', 'info');

            try {
                const response = await fetch(`${apiBaseUrl}/Open`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        version: selectedVersion
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus(data.message, 'success');
                    if (data.version) {
                        document.getElementById('versionInfo').textContent = `SolidWorks Version: ${data.version}`;
                        document.getElementById('versionInfo').style.display = 'block';
                    }
                } else {
                    showStatus(data.message || 'Failed to open SolidWorks', 'error');
                    if (response.status === 403) {
                        updateLockUI(false);
                    }
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                hideLoading(btn);
            }
        }

        async function closeSolidWorks() {
            if (!hasLock) {
                showStatus('You must have control to close SolidWorks.', 'warning');
                return;
            }

            const btn = document.getElementById('closeBtn');
            showLoading(btn);
            showStatus('Closing SolidWorks...', 'info');

            try {
                const response = await fetch(`${apiBaseUrl}/Close`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    showStatus(data.message, 'success');
                    document.getElementById('versionInfo').style.display = 'none';
                } else {
                    showStatus(data.message || 'Failed to close SolidWorks', 'error');
                    if (response.status === 403) {
                        updateLockUI(false);
                    }
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                hideLoading(btn);
            }
        }

        async function checkStatus() {
            const btn = document.getElementById('statusBtn');
            showLoading(btn);
            showStatus('Checking status...', 'info');

            try {
                const response = await fetch(`${apiBaseUrl}/Status`, {
                    method: 'GET'
                });

                const data = await response.json();

                if (data.success) {
                    if (data.isOpen) {
                        showStatus(`SolidWorks is open. Version: ${data.version || 'Unknown'}`, 'success');
                        document.getElementById('versionInfo').textContent = `SolidWorks Version: ${data.version || 'Unknown'}`;
                        document.getElementById('versionInfo').style.display = 'block';
                    } else {
                        showStatus('SolidWorks is not open.', 'info');
                        document.getElementById('versionInfo').style.display = 'none';
                    }
                } else {
                    showStatus(data.message || 'Failed to check status', 'error');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                hideLoading(btn, 'Check Status');
            }
        }

        // Load versions and check status on page load
        window.addEventListener('load', function() {
            loadAvailableVersions();
            checkStatus();
            checkLockStatus();
            
            // Periodically check lock status
            setInterval(checkLockStatus, 10000); // Every 10 seconds
        });
    </script>
</body>
</html>
